# Словарь описаний карточек (черновик для оператора, итог обрезается до 160 символов).
# Порядок пополнения — pipeline/README.md, раздел «Словарь описаний».

classes:                      # классы детектора -> русские имена (порядок вывода: люди, животные, техника)
  person: человек
  dog: собака
  cat: кошка
  horse: крупное животное (лошадь?)
  cow: крупное животное (корова?)
  sheep: животное (овца/коза?)
  bear: крупный зверь (медведь?)
  bird: птица
  car: легковая машина
  truck: грузовик
  bus: автобус/минивэн
  motorcycle: мотоцикл
  bicycle: велосипед
  boat: лодка

class_order: [person, dog, cat, horse, cow, sheep, bear, bird,
              car, truck, bus, motorcycle, bicycle, boat]

types:                        # заголовок карточки по типу
  activity: Движение
  environment: Средовой шум
  degradation: Помехи сигнала
  uncertain: Требует просмотра

dayparts:                     # по местному часу объекта
  night: ночью                # 23..05
  morning: утром              # 05..11
  day: днём                   # 11..17
  evening: вечером            # 17..23

extras:
  cross_camera: "переход между камерами"
  no_frames: "нет кадров — не распознано"
  weak_evidence: "одиночная слабая детекция"
  storm_hint: "детектор движения штормит от помех"
