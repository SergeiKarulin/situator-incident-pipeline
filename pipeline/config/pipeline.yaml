# ВАЖНО О КАЛИБРОВКЕ. Все численные пороги этого файла откалиброваны на КОНКРЕТНОМ
# контуре (9 камер, 6 объектов, 4 суток данных, июнь 2026). На другом наборе камер числа
# поплывут — это свойство пер-камерной калибровки, а не дефект. При переносе на новый контур
# пройди процедуру перекалибровки: docs/design.md, раздел «Перекалибровка на новом контуре».
# Контрольный критерий после любой перекалибровки: metrics.json -> real_lost_in_autoclosed == [].

# Пороги конвейера. Все значения per-камерно переопределяемы в overrides.

detector:
  model: yolo11s.pt          # CPU-разработка; на A10/MPS -> yolo11x.pt + imgsz 1280
  # train убран (путался с фоном бокса); животные добавлены: лось/олень в COCO нет,
  # обычно детектируются как horse/cow/dog — словарь помечает их «?»
  classes: [person, car, truck, bus, motorcycle, bicycle, boat,
            dog, cat, horse, cow, sheep, bear, bird]
  conf_per_class:            # v0.2: пер-классовые пороги (калибровка Experiment_004)
    default: 0.45            # техника: одиночные car-блобы ночью режутся
    person: 0.20             # лесной REAL давал person 0.24 — порог с запасом ниже
    dog: 0.30                # животные: средний порог
    cat: 0.30
    horse: 0.30
    cow: 0.30
    sheep: 0.30
    bear: 0.30
    bird: 0.35
    boat: 0.45               # НЕ поднимать: на 0.65 теряются REAL, где техника под чехлом
                             # детектится как boat (накрытые вертолёт и лодка на исходном контуре — был регресс);
                             # цена — единичные «boat»-карточки в тумане, их добьёт «ночная норма»
  max_frames_per_trigger: 4  # v0.5: +кадр в конце клипа (~12 c) — там часто входит объект
  extract_from_clip: true    # кадры из clip.mp4, позиции 0.5/4/9/12 c + каскад-фолбэк
  use_jpgs: false            # ПРОД-РЕЖИМ: jpg выгрузки игнорируются (их в бою не будет);
                             # true — только для отладочных сравнений с ручным разбором
  imgsz: 960                 # мелкие объекты на общих планах; 640 быстрее, но слепнет вдаль

degradation:
  enabled: true
  # эвристика помех: доля «насыщенных» строк + вертикальная частота тона (см. degradation.py)
  sat_row_threshold: 0.45    # строка считается цветной полосой, если средняя насыщенность выше
  # калибровка 2026-06-10 на прод-кадрах (из клипов): помехи D sat=0.118/flick=6.2 (p50),
  # туман E и день B — sat=0.000/flick<3.3 (p90). Пороги посередине с запасом:
  sat_rows_frac: 0.05        # кадр деградирован, если цветных строк больше этой доли...
  hue_flicker_min: 4.5       # ...и вертикальное мерцание тона выше порога
  storm_min_triggers: 5      # минимум сработок, чтобы схлопнуть час камеры в шторм-карточку

static_suppression:
  enabled: true
  iou_threshold: 0.55        # порог СТРОИТЕЛЬСТВА кластеров
  match_iou: 0.35            # порог МАТЧИНГА бокса против кластера (v0.2: бокс «плавает» в тумане)
  min_share: 0.35            # кластер статичен, если в >=35% сработок камеры (с кадрами)...
  min_triggers: 20           # ...и не менее стольких раз...
  min_span_hours: 4          # ...на интервале от 4 часов (минивэн на 46 мин мебелью не станет)
  # людей и животных не подавляем никогда (движутся; статичная «корова» 4 часа = ошибка карты)
  never_suppress: [person, dog, cat, horse, cow, sheep, bear, bird]
  # v0.3: матчинг против кластера класс-агностичен внутри группы — туман/ночь
  # перекрашивают один и тот же минивэн в car/bus/boat
  match_class_groups:
    - [car, truck, bus, boat]

sessions:
  tau_gap_seconds: 150       # пауза внутри (объект, камера) > tau_gap = новая сессия
  overrides: {}              # пример: {site-a: 300}

crosscam:
  tau_handoff_seconds: 120   # окно перехода между соседними камерами
  require_activity: true     # склеиваем только activity-сессии

cards:
  environment_aggregate: per_camera_hour   # корзина «среда»: агрегат на камеру и час
  uncertain_to_operator: true              # сомнительное -> тип «несхлопнуто» (на ручной разбор)

paths:
  weights_dir: /app/weights
  runs_dir: /runs
